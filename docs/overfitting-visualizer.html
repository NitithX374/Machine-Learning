<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Overfitting Explorer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');
  :root{
    --bg:#11161D; --panel:#1A222C; --panel2:#212B37; --border:#2C3744;
    --text:#E6EAF0; --dim:#8A96A6; --scan:#4FD8C9; --result:#F5A75C;
    --pool:#C792EA; --flat:#7FB3FF; --mlp:#9BE15D; --red:#E24B4A;
  }
  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--bg); color:var(--text); font-family:'Sarabun',sans-serif;
        display:flex; justify-content:center; padding:20px 12px 40px; -webkit-font-smoothing:antialiased; }
  .app{ width:100%; max-width:440px; }
  a.back{ font-size:12px; color:var(--dim); text-decoration:none; }
  a.back:hover{ color:var(--result); }
  .eyebrow{ font-size:12px; letter-spacing:.12em; text-transform:uppercase; color:var(--result); font-weight:600; margin:10px 0 4px; }
  h1{ font-size:20px; margin:0 0 4px; font-weight:700; }
  .subtitle{ font-size:12px; color:var(--dim); margin:0 0 14px; }
  .panel{ background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:16px; margin-bottom:12px; }
  svg{ width:100%; display:block; }
  text{ font-family:'JetBrains Mono',monospace; }
  .stats{ display:flex; gap:10px; margin-bottom:12px; }
  .stat{ flex:1; background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:10px 12px; }
  .stat .k{ font-size:11px; color:var(--dim); text-transform:uppercase; letter-spacing:.06em; }
  .stat .v{ font-size:20px; font-weight:700; font-family:'JetBrains Mono',monospace; }
  .ctrlrow{ display:flex; align-items:center; gap:10px; margin:6px 0 2px; }
  .ctrlrow label{ font-size:12px; color:var(--dim); min-width:64px; }
  .ctrlrow .val{ font-size:15px; font-weight:700; font-family:'JetBrains Mono',monospace; min-width:24px; text-align:right; color:var(--result); }
  input[type=range]{ flex:1; accent-color:var(--result); }
  #explainTitle{ font-weight:700; margin-bottom:6px; font-size:14px; }
  #explainBody{ font-size:13.5px; line-height:1.65; color:var(--dim); }
  #explainBody b{ color:var(--text); }
  .legend{ display:flex; justify-content:center; gap:14px; font-size:11.5px; color:var(--dim); margin-top:8px; flex-wrap:wrap; }
  .dot{ display:inline-block; width:10px; height:10px; border-radius:3px; vertical-align:middle; margin-right:4px; }
  .ln{ display:inline-block; width:14px; height:3px; border-radius:2px; vertical-align:middle; margin-right:4px; }
</style>
</head>
<body>
<div class="app">
  <a class="back" href="index.html">← กลับหน้ารวม</a>
  <div class="eyebrow">กับดักคลาสสิกของ ML</div>
  <h1>Overfitting Explorer</h1>
  <p class="subtitle">ลากเพิ่ม degree ของ polynomial — ดูเส้นโค้งงอจน “ท่องจำ” ข้อมูลจน error สอบตก</p>

  <div class="stats">
    <div class="stat"><div class="k">train error</div><div class="v" id="trErr" style="color:#7FB3FF">–</div></div>
    <div class="stat"><div class="k">test error</div><div class="v" id="teErr" style="color:#F5A75C">–</div></div>
  </div>

  <div class="panel">
    <svg id="plot" viewBox="0 0 360 230"></svg>
    <div class="legend">
      <span><span class="dot" style="background:#7FB3FF"></span>train</span>
      <span><span class="dot" style="background:#C792EA"></span>test</span>
      <span><span class="ln" style="background:#8A96A6"></span>ความจริง</span>
      <span><span class="ln" style="background:#F5A75C"></span>โมเดล fit</span>
    </div>
  </div>

  <div class="panel">
    <div class="ctrlrow">
      <label>degree</label>
      <input type="range" id="deg" min="1" max="12" step="1" value="3">
      <span class="val" id="degV">3</span>
    </div>
  </div>

  <div class="panel">
    <div id="explainTitle"></div>
    <div id="explainBody"></div>
  </div>
</div>

<script>
  // ---------- data ----------
  function trueF(x){ return Math.sin(2.1*x); }
  var seed=7; function rnd(){ seed=(seed*1103515245+12345)&0x7fffffff; return seed/0x7fffffff; }
  function gauss(){ return (rnd()+rnd()+rnd()+rnd()-2)/1.2; }
  var XMIN=-2.6, XMAX=2.6;
  var trainX=[], trainY=[], testX=[], testY=[];
  for(var i=0;i<13;i++){ var x=XMIN+(XMAX-XMIN)*i/12; trainX.push(x); trainY.push(trueF(x)+gauss()*0.22); }
  for(var i=0;i<11;i++){ var x=XMIN+0.22+(XMAX-XMIN)*i/10*0.97; testX.push(x); testY.push(trueF(x)+gauss()*0.22); }

  // normalize x to [-1,1] for conditioning
  function nx(x){ return 2*(x-XMIN)/(XMAX-XMIN)-1; }

  // ---------- least squares poly fit (normal equations + Gaussian elim) ----------
  function solve(A,b){
    var n=b.length, i,j,k;
    for(i=0;i<n;i++){
      var p=i; for(k=i+1;k<n;k++) if(Math.abs(A[k][i])>Math.abs(A[p][i])) p=k;
      var tmp=A[i];A[i]=A[p];A[p]=tmp; var tb=b[i];b[i]=b[p];b[p]=tb;
      var piv=A[i][i]||1e-12;
      for(k=i+1;k<n;k++){ var f=A[k][i]/piv; for(j=i;j<n;j++) A[k][j]-=f*A[i][j]; b[k]-=f*b[i]; }
    }
    var x=new Array(n).fill(0);
    for(i=n-1;i>=0;i--){ var s=b[i]; for(j=i+1;j<n;j++) s-=A[i][j]*x[j]; x[i]=s/(A[i][i]||1e-12); }
    return x;
  }
  function fit(deg){
    var m=deg+1, n=trainX.length, Phi=[];
    for(var i=0;i<n;i++){ var row=[1], xn=nx(trainX[i]); for(var j=1;j<m;j++) row.push(row[j-1]*xn); Phi.push(row); }
    var A=[],b=[];
    for(var a=0;a<m;a++){ A.push(new Array(m).fill(0)); var sb=0;
      for(var c=0;c<m;c++){ var s=0; for(i=0;i<n;i++) s+=Phi[i][a]*Phi[i][c]; A[a][c]=s+(a===c?1e-7:0); }
      for(i=0;i<n;i++) sb+=Phi[i][a]*trainY[i]; b.push(sb);
    }
    return solve(A,b);
  }
  function evalP(coef,x){ var p=0,xp=1,xn=nx(x); for(var k=0;k<coef.length;k++){ p+=coef[k]*xp; xp*=xn; } return p; }
  function rmse(coef,X,Y){ var s=0; for(var i=0;i<X.length;i++){ var d=evalP(coef,X[i])-Y[i]; s+=d*d; } return Math.sqrt(s/X.length); }

  // ---------- plot ----------
  var YMIN=-2.1, YMAX=2.1, PAD=10, W=360, Hh=230;
  function px(x){ return PAD + (x-XMIN)/(XMAX-XMIN)*(W-2*PAD); }
  function py(v){ return (Hh-PAD) - (v-YMIN)/(YMAX-YMIN)*(Hh-2*PAD); }

  function render(){
    var deg=+document.getElementById('deg').value;
    document.getElementById('degV').textContent=deg;
    var coef=fit(deg);
    var g='';
    g+=`<rect x="${PAD}" y="${PAD}" width="${W-2*PAD}" height="${Hh-2*PAD}" fill="none" stroke="#2C3744" stroke-width="1"/>`;
    // true curve
    var tp=[]; for(var i=0;i<=160;i++){ var x=XMIN+(XMAX-XMIN)*i/160; tp.push(px(x)+','+py(trueF(x))); }
    g+=`<polyline points="${tp.join(' ')}" fill="none" stroke="#8A96A6" stroke-width="1.5" stroke-dasharray="5 4"/>`;
    // fitted curve (clip y to view)
    var fp=[]; for(i=0;i<=240;i++){ var x=XMIN+(XMAX-XMIN)*i/240; var v=Math.max(YMIN-1,Math.min(YMAX+1,evalP(coef,x))); fp.push(px(x)+','+py(v)); }
    g+=`<polyline points="${fp.join(' ')}" fill="none" stroke="#F5A75C" stroke-width="2.5"/>`;
    // points
    testX.forEach(function(x,i){ g+=`<circle cx="${px(x)}" cy="${py(testY[i])}" r="3.5" fill="#C792EA"/>`; });
    trainX.forEach(function(x,i){ g+=`<circle cx="${px(x)}" cy="${py(trainY[i])}" r="4.5" fill="#7FB3FF" stroke="#11161D" stroke-width="1"/>`; });
    document.getElementById('plot').innerHTML=g;

    var tr=rmse(coef,trainX,trainY), te=rmse(coef,testX,testY);
    document.getElementById('trErr').textContent=tr.toFixed(3);
    document.getElementById('teErr').textContent=te.toFixed(3);

    var T,B;
    if(deg<=2){ T='Underfitting — ง่ายเกินไป'; B='เส้นตรง/โค้งตื้น ตามความจริง (เส้นประ) ไม่ทัน — <b>train error และ test error สูงทั้งคู่</b> โมเดลยังไม่มีความสามารถพอ'; }
    else if(deg<=5){ T='พอดี ✓ — generalize ได้ดี'; B='เส้น fit (ส้ม) เกาะตามความจริงสวย ทั้ง train และ test error <b>ต่ำพอ ๆ กัน</b> — นี่คือจุดที่เราต้องการ'; }
    else if(deg<=8){ T='เริ่ม Overfit — เส้นเริ่มดิ้น'; B='เส้นเริ่มโค้งงอเกินจำเป็นเพื่อไล่จุด train — สังเกต <b>train error ลดต่อ แต่ test error เริ่มสูงขึ้น</b>'; }
    else{ T='Overfitting หนัก! 🌀'; B='เส้นดิ้นสุด ๆ ลากผ่านจุด train เกือบเป๊ะ (<b>train error ต่ำมาก</b>) แต่ระหว่างจุดมันเหวี่ยงหลุดโลก — <b>test error พุ่ง</b> เพราะมัน “ท่องจำ noise” ไม่ได้เรียน pattern จริง'; }
    document.getElementById('explainTitle').textContent=T;
    document.getElementById('explainBody').innerHTML=B;
  }
  document.getElementById('deg').oninput=render;
  render();
</script>
</body>
</html>
